<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/styleLogin.css}">
</head>
<body>
    <h1 class="titulo">Restaurante La Casa del Sabor</h1>
    <div class="container">
        <form action="/login" method="post">
            <h2>Iniciar Sesión</h2>
            <input type="text" name="username" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Ingresar</button>
        </form>
        <br>
        <br>
        <a href="/cliente">
            <button class="pedido-btn">Interfaz de pedidos</button>
        </a>
    </div>

    <script th:if="${error != null}">
        alert('[[${error}]]');
    </script>
</body>
</html>
